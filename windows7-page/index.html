<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="./styles/body.css">
    <link rel="stylesheet" href="./styles/window.css">
    <link rel="stylesheet" href="./styles/content.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindowsPage</title>
    <meta name="author" content="nunes">
</head>
<body>
    <div class="window">
        <div class="buttons-container">
            <ul class="buttons-list">
                <li><button id="btn-min">-</button></li>
                <li><button id="btn-max">[ _ ]</button></li>
                <li><button id="btn-exit">X</button></li>
            </ul>
        </div>
        <br>
        <div class="buttons-return">
            <button id="btn-back">&lt;</button><button id="btn-next">&gt;</button>
        </div>
        <div class="search">
            <p>https://home.com</p>
        </div>
        <br>
        <div class="home">
            <main>
                <h1>Welcome/Bem vindo!</h1>
                <p>Página inspirada no windows 7, criada para treinar CSS.</p>
                <p>Me inspirei bastante em estéticas de internet dos anos 2000, como o <a href="https://pt.wikipedia.org/wiki/Frutiger_Aero" target="_blank">frutiger aero</a>, para desenvolver o estilo dessa página.</p>
                <div id="bolhas">
                    <img src="https://i.pinimg.com/originals/fa/08/71/fa0871e17c202452a4a3c7aaf0b828dd.gif">
                </div>
            </main>
        </div>
    </div>
    <footer>
        <div class="panel">

        </div>
    </footer>
</body>
</html>
